upstream tidemate_backend {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name tidemate.example.com;

    root /var/www/tidemate/frontend/dist;
    index index.html;

    client_max_body_size 10M;

    # Security headers for the React frontend.
    # Replace tidemate.example.com with your real production domain before deployment.
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self'; script-src-attr 'none'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: https://*.basemaps.cartocdn.com https://*.openstreetmap.org https://openstreetmap.org; connect-src 'self' https://tidemate.example.com wss://tidemate.example.com; frame-src 'self' https://www.openstreetmap.org; frame-ancestors 'none'; form-action 'self'; upgrade-insecure-requests" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # Built frontend assets can be cached aggressively.
    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # Django REST API.
    location /api/ {
        proxy_pass http://tidemate_backend;
        proxy_http_version 1.1;

        proxy_set_header Host tidemate.example.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Django Channels / WebSockets.
    location /ws/ {
        if ($http_upgrade !~* "^websocket$") {
            return 400;
        }

        proxy_pass http://tidemate_backend;

        # nosemgrep: generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
        proxy_http_version 1.1;
        # nosemgrep: generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
        proxy_set_header Upgrade "websocket";
        # nosemgrep: generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
        proxy_set_header Connection "upgrade";

        proxy_set_header Host tidemate.example.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 75s;
        proxy_send_timeout 75s;
    }

    # Uploaded media.
    # For real production, S3/Cloudinary/object storage is usually better.
    location /media/ {
        alias /var/www/tidemate/backend/media/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'none'; img-src 'self' data:; style-src 'none'; script-src 'none';" always;
    }

    # React Router fallback.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }
}