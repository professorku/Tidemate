name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest

    env:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      SECRET_KEY: ci-test-secret-key-only-not-production-change-me-long-value # pragma: allowlist secret
      DEBUG: "False"
      PYTHONUNBUFFERED: "1"
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system check
        run: python manage.py check

      - name: Check migrations are committed
        run: python manage.py makemigrations --check --dry-run

      - name: Run backend tests
        run: python manage.py test --verbosity=2

  backend-deploy-check:
    name: Backend production deploy check
    runs-on: ubuntu-latest

    env:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      SECRET_KEY: ci-production-check-secret-key-only-not-production-change-me-long-value # pragma: allowlist secret
      DEBUG: "False"
      PYTHONUNBUFFERED: "1"
      ALLOWED_HOSTS: tidemate.example.com
      CORS_ALLOWED_ORIGINS: https://tidemate.example.com
      CSRF_TRUSTED_ORIGINS: https://tidemate.example.com
      REDIS_URL: redis://localhost:6379/0
      LOCATION_PRIVACY_SALT: ci-location-privacy-salt-only-not-production-change-me-32-plus-chars # pragma: allowlist secret
      JWT_ACCESS_COOKIE_SECURE: "True"
      JWT_REFRESH_COOKIE_SECURE: "True"
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django deployment checks
        run: python manage.py check --deploy --fail-level WARNING

  frontend-tests:
    name: Frontend lint, test, build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v6
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7