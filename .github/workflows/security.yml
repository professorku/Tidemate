name: Security

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install detect-secrets
        run: |
          python -m pip install --upgrade pip
          pip install detect-secrets

      - name: Scan for committed secrets
        run: |
          detect-secrets scan --all-files \
            --disable-plugin KeywordDetector \
            --exclude-files '(^frontend/package-lock.json$|^backend/.env.example$|^frontend/.env.example$|^.*\.svg$|^.*\.png$|^.*\.jpg$|^.*\.jpeg$|^.*\.webp$|^.*\.zip$|^__MACOSX/|^\.git/)' \
            > detect-secrets-report.json

          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("detect-secrets-report.json").read_text())
          results = report.get("results", {})
          count = sum(len(items) for items in results.values())

          if count:
              print(f"Potential secrets found: {count}")
              for filename, findings in results.items():
                  print(f"\n{filename}")
                  for finding in findings:
                      print(f"  line {finding.get('line_number')}: {finding.get('type')}")
              raise SystemExit(1)

          print("No secrets detected.")
          PY

  python-dependency-audit:
    name: Python dependency audit
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Audit Python dependencies
        run: pip-audit -r requirements.txt --progress-spinner off || true

  backend-static-security:
    name: Backend static security scan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: Run Bandit
        run: |
          bandit -r . \
            -x "*/tests/*,*/migrations/*" \
            --severity-level medium \
            --confidence-level medium || true

  frontend-dependency-audit:
    name: Frontend dependency audit
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit production frontend dependencies
        run: npm audit --omit=dev --audit-level=moderate || true

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/python \
            --config p/django \
            --config p/javascript \
            --config p/react \
            --config p/secrets \
            --exclude frontend/package-lock.json \
            --exclude frontend/dist \
            --exclude backend/staticfiles \
            --exclude backend/media \
            --exclude backend/db.sqlite3 \
            --exclude 'backend/*/migrations' \
            . || true