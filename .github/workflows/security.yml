secret-scan:
  name: Secret scan
  runs-on: ubuntu-latest

  steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"

    - name: Install detect-secrets
      run: |
        python -m pip install --upgrade pip
        pip install detect-secrets

    - name: Scan for committed secrets
      run: |
        detect-secrets scan --all-files \
          --disable-plugin KeywordDetector \
          --exclude-files '(^frontend/package-lock.json$|^backend/.env.example$|^frontend/.env.example$|^.*\.svg$|^.*\.png$|^.*\.jpg$|^.*\.jpeg$|^.*\.webp$|^.*\.zip$|^__MACOSX/|^\.git/)' \
          > detect-secrets-report.json

        python - <<'PY'
        import json
        from pathlib import Path

        report = json.loads(Path("detect-secrets-report.json").read_text())
        results = report.get("results", {})
        count = sum(len(items) for items in results.values())

        if count:
            print(f"Potential secrets found: {count}")
            for filename, findings in results.items():
                print(f"\n{filename}")
                for finding in findings:
                    print(f"  line {finding.get('line_number')}: {finding.get('type')}")
            raise SystemExit(1)

        print("No secrets detected.")
        PY

    - name: Upload secret scan report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: detect-secrets-report
        path: detect-secrets-report.json
        retention-days: 7