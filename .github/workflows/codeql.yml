name: CodeQL

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  codeql-disabled-for-private-repo:
    name: CodeQL disabled for private repo
    runs-on: ubuntu-latest

    steps:
      - name: Explain why CodeQL is disabled
        run: |
          echo "CodeQL code scanning is disabled for normal pushes."
          echo "For private repositories, GitHub code scanning requires GitHub Code Security / Advanced Security."
          echo "Keep Semgrep, Bandit, dependency audit, and secret scanning enabled instead."