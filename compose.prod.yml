services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tidemate}
      POSTGRES_USER: ${POSTGRES_USER:-tidemate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tidemate} -d ${POSTGRES_DB:-tidemate}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-tidemate}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tidemate}
      REDIS_URL: redis://redis:6379/0
      ENABLE_PLAIN_HTTP_HEALTHCHECK: "True"
    volumes:
      - backend-static:/app/staticfiles
      - backend-media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
      python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput &&
      daphne -b 0.0.0.0 -p 8000 config.asgi:application
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/users/health/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  maintenance:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-tidemate}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tidemate}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      python manage.py run_scheduled_maintenance

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    ports:
      - "${FRONTEND_HTTP_BIND:-127.0.0.1}:${FRONTEND_HTTP_PORT:-8080}:80"
    volumes:
      - backend-static:/usr/share/nginx/static:ro
      - backend-media:/usr/share/nginx/media:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:
  redis-data:
  backend-static:
  backend-media: